apiVersion: v1
kind: Namespace
metadata:
  name: app-dev-mixed
  labels:
    offhours.platform.io/schedule: "dev-weekday"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: app-dev-mixed
  labels:
    app.kubernetes.io/name: web
    argocd.argoproj.io/instance: mixed-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
        argocd.argoproj.io/instance: mixed-app
    spec:
      containers:
        - name: web
          image: nginx:1.27
          ports:
            - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor
  namespace: app-dev-mixed
  annotations:
    offhours.platform.io/protected: "true"
  labels:
    app.kubernetes.io/name: processor
    argocd.argoproj.io/instance: mixed-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: processor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: processor
        argocd.argoproj.io/instance: mixed-app
    spec:
      containers:
        - name: processor
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
