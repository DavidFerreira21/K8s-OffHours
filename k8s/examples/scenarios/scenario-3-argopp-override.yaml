apiVersion: v1
kind: Namespace
metadata:
  name: app-dev-argopp
  labels:
    offhours.platform.io/schedule: "dev-weekday"
    offhours.platform.io/argopp: "smb-app,billing-app"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smb-api
  namespace: app-dev-argopp
  labels:
    app.kubernetes.io/name: smb-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: smb-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: smb-api
    spec:
      containers:
        - name: api
          image: nginx:1.27
          ports:
            - containerPort: 80
