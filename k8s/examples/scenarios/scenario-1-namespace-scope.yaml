apiVersion: v1
kind: Namespace
metadata:
  name: app-dev-ns-scope
  labels:
    offhours.platform.io/schedule: "dev"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: app-dev-ns-scope
  labels:
    app.kubernetes.io/name: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
    spec:
      containers:
        - name: api
          image: nginx:1.27
          ports:
            - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: critical-worker
  namespace: app-dev-ns-scope
  annotations:
    offhours.platform.io/protected: "true"
  labels:
    app.kubernetes.io/name: critical-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: critical-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: critical-worker
    spec:
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sh", "-c", "sleep 3600"]
