apiVersion: batch/v1
kind: CronJob
metadata:
  name: offhours-startup
  namespace: offhours-system
spec:
  schedule: "2-59/4 * * * *"
  timeZone: "America/Sao_Paulo"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: offhours-sa
          restartPolicy: OnFailure
          containers:
            - name: offhours
              image: david210/k8s-offhours:8c17278f336f5d86155db5b90b68252b8eea13e2
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: offhours-config
                - secretRef:
                    name: offhours-secrets
              env:
                - name: ACTION
                  value: startup
