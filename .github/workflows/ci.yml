name: Offhours Quality And Release

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff
        run: |
          ruff check .
          ruff format --check .

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run tests
        run: pytest -q

  build_and_scan:
    name: Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: test
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/k8s-offhours
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t k8s-offhours:ci .

      - name: Run Trivy scan (HIGH,CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: k8s-offhours:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Login Docker Hub
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image tag (SHA) for branch
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          docker tag k8s-offhours:ci ${IMAGE_NAME}:${GITHUB_SHA}
          docker push ${IMAGE_NAME}:${GITHUB_SHA}

      - name: Login Docker Hub (release)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push release tags (semver + latest)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          MAJOR=${VERSION%%.*}
          MINOR=${VERSION%.*}
          docker tag k8s-offhours:ci ${IMAGE_NAME}:${VERSION}
          docker tag k8s-offhours:ci ${IMAGE_NAME}:${MINOR}
          docker tag k8s-offhours:ci ${IMAGE_NAME}:${MAJOR}
          docker tag k8s-offhours:ci ${IMAGE_NAME}:latest
          docker push ${IMAGE_NAME}:${VERSION}
          docker push ${IMAGE_NAME}:${MINOR}
          docker push ${IMAGE_NAME}:${MAJOR}
          docker push ${IMAGE_NAME}:latest
